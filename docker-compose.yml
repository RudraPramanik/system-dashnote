services:
  db:
    image: postgres:16-alpine
    container_name: dashnotesystem-db
    environment:
      POSTGRES_DB: dashnotes
      POSTGRES_USER: dashuser
      POSTGRES_PASSWORD: dashpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashuser -d dashnotes"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: dashnotesystem-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://dashuser:dashpass@db:5432/dashnotes
      JWT_SECRET: dev-secret
      JWT_REFRESH_SECRET: dev-refresh-secret
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dashnotesystem-api
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://dashuser:dashpass@db:5432/dashnotes
      JWT_SECRET: dev-secret
      JWT_REFRESH_SECRET: dev-refresh-secret
      REDIS_URL: redis://redis:6379/0
      DEBUG: "true"
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  postgres_data:
